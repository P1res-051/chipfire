apiVersion: apps/v1
kind: Deployment
metadata:
  name: chipfire-evolution
  namespace: pires
  labels:
    app.kubernetes.io/name: chipfire-evolution
    app.kubernetes.io/part-of: chipfire
spec:
  # Manter em 1 replica — Evolution API é stateful (sessões WhatsApp).
  # Múltiplas réplicas causam conflito de sessão. Sem HPA aqui.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chipfire-evolution
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chipfire-evolution
        app.kubernetes.io/part-of: chipfire
    spec:
      containers:
        - name: evolution-api
          image: atendai/evolution-api:v2.3.7
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AUTHENTICATION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chipfire-secrets
                  key: EVOLUTION_API_KEY

            # PostgreSQL — banco "evolution" (separado do evo_crm)
            - name: DATABASE_ENABLED
              value: "true"
            - name: DATABASE_PROVIDER
              value: "postgresql"
            - name: DATABASE_CONNECTION_URI
              valueFrom:
                secretKeyRef:
                  name: chipfire-secrets
                  key: EVOLUTION_DATABASE_URL
            - name: DATABASE_CONNECTION_CLIENT_NAME
              value: "evolution_exchange"
            - name: DATABASE_SAVE_DATA_INSTANCE
              value: "true"
            - name: DATABASE_SAVE_DATA_NEW_MESSAGE
              value: "true"
            - name: DATABASE_SAVE_MESSAGE_UPDATE
              value: "true"
            # false = workaround para bug no QR code
            - name: DATABASE_SAVE_DATA_CONTACTS
              value: "false"
            - name: DATABASE_SAVE_DATA_CHATS
              value: "false"
            - name: DATABASE_SAVE_DATA_LABELS
              value: "false"
            - name: DATABASE_SAVE_DATA_HISTORIC
              value: "false"

            # Redis — Service chipfire-redis (corrigido)
            - name: CACHE_REDIS_ENABLED
              value: "true"
            - name: CACHE_REDIS_URI
              value: "redis://chipfire-redis:6379/6"
            - name: CACHE_REDIS_PREFIX_KEY
              value: "evolution"
            - name: CACHE_REDIS_SAVE_INSTANCES
              value: "false"
            - name: CACHE_LOCAL_ENABLED
              value: "false"

            - name: CONFIG_SESSION_PHONE_VERSION
              value: "2.3000.1027934701"

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

          volumeMounts:
            - name: evolution-store
              mountPath: /evolution/store
            - name: evolution-instances
              mountPath: /evolution/instances

      volumes:
        - name: evolution-store
          persistentVolumeClaim:
            claimName: chipfire-evolution-store
        - name: evolution-instances
          persistentVolumeClaim:
            claimName: chipfire-evolution-instances
