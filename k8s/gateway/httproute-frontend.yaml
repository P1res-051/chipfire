# Gateway: eg (default namespace) — listener https-automation (*.automation.app.br)
# Confirmado: allowedRoutes.namespaces.from: All — nenhum ReferenceGrant necessário
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chipfire-frontend
  namespace: pires
  labels:
    app.kubernetes.io/name: chipfire-frontend
    app.kubernetes.io/part-of: chipfire
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      namespace: default
      sectionName: https-automation
  hostnames:
    - "chipfire.automation.app.br"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: chipfire-frontend
          port: 80
      timeouts:
        request: 30s
