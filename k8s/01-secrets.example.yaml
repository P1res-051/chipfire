apiVersion: v1
kind: Secret
metadata:
  name: chipfire-secrets
  namespace: pires
  labels:
    app.kubernetes.io/part-of: chipfire
type: Opaque
stringData:
  POSTGRES_USER: "evo_user"
  POSTGRES_PASSWORD: "__ROTATE_AND_SET_POSTGRES_PASSWORD__"
  DATABASE_URL: "postgresql://evo_user:__ROTATE_AND_SET_POSTGRES_PASSWORD__@session-bouncer.pgbouncer.svc.cluster.local:6432/evo_crm?schema=public&pgbouncer=true"
  DATABASE_ADMIN_URL: "postgresql://postgres:__SET_POSTGRES_ADMIN_PASSWORD__@chipfire-postgres:5432/postgres"

  JWT_SECRET: "__GENERATE_JWT_SECRET__"
  JWT_REFRESH_SECRET: "__GENERATE_JWT_REFRESH_SECRET__"

  EVOLUTION_API_KEY: "__GENERATE_EVOLUTION_API_KEY__"
  EVOLUTION_WEBHOOK_SECRET: "__GENERATE_EVOLUTION_WEBHOOK_SECRET__"
  EVOLUTION_DATABASE_URL: "postgresql://evo_user:__ROTATE_AND_SET_POSTGRES_PASSWORD__@session-bouncer.pgbouncer.svc.cluster.local:6432/evolution?schema=public&pgbouncer=true"

  MINIO_ROOT_USER: "evolution_admin"
  MINIO_ROOT_PASSWORD: "__ROTATE_AND_SET_MINIO_ROOT_PASSWORD__"

  REDIS_PASSWORD: ""
