apiVersion: v1
kind: ConfigMap
metadata:
  name: chipfire-config
  namespace: pires
  labels:
    app.kubernetes.io/part-of: chipfire
data:
  # URLs públicas
  APP_URL: "https://chipfire.automation.app.br"
  FRONTEND_URL: "https://chipfire.automation.app.br"
  API_URL: "https://chipfire-api.automation.app.br/api"
  FRONTEND_PORT: "80"
  BACKEND_PORT: "3000"

  # PostgreSQL — referencia Service chipfire-postgres (Endpoints → 10.1.0.200)
  POSTGRES_DB: "evo_crm"

  # Redis — Service chipfire-redis (StatefulSet in-cluster)
  REDIS_HOST: "chipfire-redis"
  REDIS_PORT: "6379"

  # MinIO — Service chipfire-minio (ExternalName → minio.evolution.svc.cluster.local)
  MINIO_ENABLED: "true"
  MINIO_ENDPOINT: "http://chipfire-minio:9000"
  MINIO_PUBLIC_URL: "https://minio.smartsales.one"
  MINIO_BUCKET: "evo-crm"
  MAX_MEDIA_SIZE_MB: "25"

  # Evolution API — Service chipfire-evolution (in-cluster)
  EVOLUTION_API_URL_INTERNAL: "http://chipfire-evolution:8080"
  EVOLUTION_API_URL_PUBLIC: "https://evolution-api.automation.app.br"

  # JWT TTLs
  JWT_ACCESS_TTL_SECONDS: "900"
  JWT_REFRESH_TTL_SECONDS: "2592000"

  # Limites operacionais
  DEFAULT_DAILY_LIMIT_PER_INSTANCE: "200"
  DEFAULT_ALLOWED_START_TIME: "08:00"
  DEFAULT_ALLOWED_END_TIME: "20:00"
  DEFAULT_INTERVAL_MIN_SECONDS: "15"
  DEFAULT_INTERVAL_MAX_SECONDS: "60"
  MAX_ERROR_RATE_PERCENT: "5"
  MAX_OPTOUT_RATE_PERCENT: "2"
  MAX_RETRIES: "3"
  AUTO_PAUSE_ON_INSTABILITY: "true"

  # CORS
  CORS_ORIGINS: "https://chipfire.automation.app.br"

  # Logs
  LOG_LEVEL: "info"
  LOG_PRETTY: "false"

  # Integrações opcionais
  AI_ENABLED: "false"
  OPENAI_API_KEY: ""
  TYPEBOT_ENABLED: "false"
  TYPEBOT_URL: ""
  TYPEBOT_API_KEY: ""
