# Job para criar o banco 'evolution' no PostgreSQL externo.
# Roda UMA VEZ antes do primeiro deploy da evolution-api.
# Após rodar com sucesso, pode ser deletado: kubectl delete job init-evolution-db -n pires
#
# Requer uma conta com permissão CREATEDB no Postgres.
# Preencha DATABASE_ADMIN_URL em 01-secrets.yaml antes de aplicar.
#
# Como rodar manualmente:
#   kubectl apply -f k8s/jobs/init-evolution-db.yaml
#   kubectl logs -n pires job/init-evolution-db
#   kubectl delete job init-evolution-db -n pires
apiVersion: batch/v1
kind: Job
metadata:
  name: init-evolution-db
  namespace: pires
  labels:
    app.kubernetes.io/name: init-evolution-db
    app.kubernetes.io/part-of: chipfire
spec:
  ttlSecondsAfterFinished: 300  # auto-deleta 5 min após conclusão
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql-init
          image: postgres:16-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Verificando se o banco 'evolution' existe..."
              EXISTS=$(psql "$ADMIN_URL" -tAc "SELECT 1 FROM pg_database WHERE datname='evolution'")
              if [ "$EXISTS" = "1" ]; then
                echo "Banco 'evolution' já existe — nada a fazer."
              else
                echo "Criando banco 'evolution'..."
                psql "$ADMIN_URL" -c "CREATE DATABASE evolution;"
                psql "$ADMIN_URL" -c "GRANT ALL PRIVILEGES ON DATABASE evolution TO evo;"
                echo "Banco 'evolution' criado com sucesso."
              fi
          env:
            - name: ADMIN_URL
              valueFrom:
                secretKeyRef:
                  name: chipfire-secrets
                  key: DATABASE_ADMIN_URL
